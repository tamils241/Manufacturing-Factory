<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Stackly Manufacturing Factory</title>
  <meta name="description" content="Sign in to Stackly Manufacturing Factory customer portal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  
  <main>
    <section class="section contact" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
      <div style="width:100%;max-width:480px;margin:0 auto">
        <div style="text-align:center;margin-bottom:24px">
          <p class="eyebrow">Customer Portal</p>
          <h2 style="font-size:2rem">Sign in to Stackly.</h2>
          <p style="color:var(--muted)">Access quote requests, product inquiries, production updates, and supplier communication.</p>
        </div>
        <form class="quote-form" style="margin:0 auto">
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" maxlength="8" required>
          <p id="roleErrorLogin" style="color:#e53e3e;font-size:0.85rem;font-weight:600;display:none;text-align:center">Please select a role</p>
          <div style="display:flex;gap:12px;padding:8px 0;justify-content:center">
            <label id="roleAdminLogin" style="flex:1;max-width:160px;text-align:center;padding:12px;border:2px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:0.2s;font-weight:600">
              <input type="radio" name="role" value="admin" style="display:none" onchange="document.getElementById('roleAdminLogin').style.borderColor='var(--primary)';document.getElementById('roleCustomerLogin').style.borderColor='var(--line)'"> Admin
            </label>
            <label id="roleCustomerLogin" style="flex:1;max-width:160px;text-align:center;padding:12px;border:2px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:0.2s;font-weight:600">
              <input type="radio" name="role" value="customer" style="display:none" onchange="document.getElementById('roleCustomerLogin').style.borderColor='var(--primary)';document.getElementById('roleAdminLogin').style.borderColor='var(--line)'"> Client
            </label>
          </div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0">
            <input type="checkbox" style="width:16px;height:16px;cursor:pointer"> Remember me
          </label>
          <button class="btn" type="submit">Sign In</button>
          <p class="form-status">Demo form only. Connect authentication before launch.</p>
          <p style="text-align:center;margin-top:8px">Don't have an account? <a href="signup.html" style="color:var(--secondary);font-weight:700">Sign Up</a></p>
          <p style="text-align:center;margin-top:4px"><a href="index.html" style="color:#64748b;font-size:0.85rem;transition:color 0.2s" onmouseover="this.style.color='#f39c12'" onmouseout="this.style.color='#64748b'"><i class="fa-solid fa-house"></i> Back to Home</a></p>
        </form>
      </div>
    </section>
  </main>
  <script>
    document.querySelector('.quote-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var roleSelected = document.querySelector('input[name="role"]:checked');
      document.getElementById('roleErrorLogin').style.display = 'none';
      if (!roleSelected) {
        document.getElementById('roleErrorLogin').style.display = 'block';
        return;
      }
      if (roleSelected.value === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else {
        window.location.href = 'customer-dashboard.html';
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
