<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Stackly Manufacturing Factory</title>
  <meta name="description" content="Create a Stackly Manufacturing Factory customer portal account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  
  <main>
    <section class="section contact" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
      <div style="width:100%;max-width:480px;margin:0 auto">
        <div style="text-align:center;margin-bottom:24px">
          <p class="eyebrow">New Account</p>
          <h2 style="font-size:2rem">Create your Stackly portal account.</h2>
          <p style="color:var(--muted)">Start quote requests, save product interests, and coordinate with Stackly sales engineers.</p>
        </div>
        <form class="quote-form" style="margin:0 auto">
          <input type="text" placeholder="Full Name" pattern="[A-Za-z\s\-']+" title="Letters only" maxlength="16" oninput="this.value=this.value.replace(/[0-9]/g,'')" required>
          <input type="text" placeholder="Company" required>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" id="password" maxlength="8" oninput="validatePasswords()" required>
          <input type="password" placeholder="Confirm Password" id="confirmPassword" maxlength="8" oninput="validatePasswords()" required>
          <p id="passwordError" style="color:#e53e3e;font-size:0.85rem;font-weight:600;display:none">Passwords do not match</p>
          <p id="roleError" style="color:#e53e3e;font-size:0.85rem;font-weight:600;display:none;text-align:center">Please select a role</p>
          <div style="display:flex;gap:12px;padding:8px 0;justify-content:center">
            <label id="roleAdmin" style="flex:1;max-width:160px;text-align:center;padding:12px;border:2px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:0.2s;font-weight:600">
              <input type="radio" name="role" value="admin" style="display:none" onchange="document.getElementById('roleAdmin').style.borderColor='var(--primary)';document.getElementById('roleCustomer').style.borderColor='var(--line)'"> Admin
            </label>
            <label id="roleCustomer" style="flex:1;max-width:160px;text-align:center;padding:12px;border:2px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:0.2s;font-weight:600">
              <input type="radio" name="role" value="customer" style="display:none" onchange="document.getElementById('roleCustomer').style.borderColor='var(--primary)';document.getElementById('roleAdmin').style.borderColor='var(--line)'"> Customer
            </label>
          </div>
          <button class="btn" type="submit">Create Account</button>
          <p class="form-status">Demo form only. Connect authentication before launch.</p>
          <p style="text-align:center;margin-top:8px">Already have an account? <a href="login.html" style="color:var(--secondary);font-weight:700">Sign In</a></p>
          <p style="text-align:center;margin-top:4px"><a href="index.html" style="color:#64748b;font-size:0.85rem;transition:color 0.2s" onmouseover="this.style.color='#f39c12'" onmouseout="this.style.color='#64748b'"><i class="fa-solid fa-house"></i> Back to Home</a></p>
        </form>
      </div>
    </section>
  </main>
  <script>
    function validatePasswords() {
      var pwd = document.getElementById('password').value;
      var confirm = document.getElementById('confirmPassword').value;
      var error = document.getElementById('passwordError');
      if (confirm.length > 0 && pwd !== confirm) {
        error.style.display = 'block';
      } else {
        error.style.display = 'none';
      }
    }
    document.querySelector('.quote-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var pwd = document.getElementById('password').value;
      var confirm = document.getElementById('confirmPassword').value;
      var roleSelected = document.querySelector('input[name="role"]:checked');
      document.getElementById('passwordError').style.display = 'none';
      document.getElementById('roleError').style.display = 'none';
      if (!roleSelected) {
        document.getElementById('roleError').style.display = 'block';
        return;
      }
      if (pwd !== confirm) {
        document.getElementById('passwordError').style.display = 'block';
        return;
      }
      window.location.href = 'login.html';
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
